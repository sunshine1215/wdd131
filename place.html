<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore Nigeria's culture, weather, geography, and beautiful landscapes on this country page project.">
  <meta name="author" content="Sarah Itse">

  <title>Nigeria – Country Page</title>

  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>
<body>
  <header>
    <h1>Nigeria</h1>
  </header>

  <main>
    <!-- Hero Image with srcset -->
    <div class="hero">
      <picture>

  <source
    media="(min-width: 768px)"
    srcset="images/nigeria-large.webp"
  >

  <img
    src="images/nigeria-small.webp"
    alt="Beautiful landscape of Nigeria"
  >

</picture>
    </div>

    <div class="content-grid">

      <!-- Data Section -->
      <section class="data-card">
        <h2>Data</h2>
        <table>
          <tr><td>Area:</td><td>923,768 sq km</td></tr>
          <tr><td>Population:</td><td>223,804,632</td></tr>
          <tr><td>Capital:</td><td>Abuja</td></tr>
          <tr><td>Language:</td><td>English</td></tr>
          <tr><td>Currency:</td><td>Nigerian Naira</td></tr>
          <tr><td>Time Zone:</td><td>UTC+1</td></tr>
          <tr><td>Calling Code:</td><td>+234</td></tr>
          <tr><td>Internet TLD:</td><td>.ng</td></tr>
        </table>
      </section>

      <section class="weather">

  <h2>Weather</h2>

  <!-- SVG ICON -->

  <img
    src="images/weather.svg"
    alt="Weather icon"
    class="weather-icon"
  >

  <div class="info">

    <p><strong>Temperature:</strong> 8°C</p>

    <p><strong>Conditions:</strong> Cloudy</p>

    <p><strong>Wind Speed:</strong> 10 km/h</p>

    <p>
      <strong>Wind Chill:</strong>
      <span id="windchill"></span>
    </p>

  </div>

</section>
  </main>

  <footer>
  <p>&copy; <span id="current-year"></span> 🌷Sarah Itse🌷Nigeria</p>
  <p>Last Modified: <span id="last-modified"></span></p>
</footer>

</body>
</html>
